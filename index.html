<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kişiselleştirilmiş Makyaj Asistanı</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { display: flex; height: 100vh; background-color: #fcf8f8; }
        
        /* Sol Taraf: Görseller */
        .left-side {
            width: 40%;
            background: #f3e5f5;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
            padding: 20px;
            border-right: 2px solid #e1bee7;
        }
        .left-side img {
            width: 85%;
            max-height: 40%;
            object-fit: cover;
            border-radius: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        /* Sağ Taraf: Yapay Zeka Test ve Sohbet Alanı */
        .right-side {
            width: 60%;
            display: flex;
            flex-direction: column;
            padding: 30px;
        }
        .header { text-align: center; margin-bottom: 20px; color: #4a148c; }
        
        /* API Key Giriş Alanı */
        .api-box { background: #fff; padding: 15px; border-radius: 10px; margin-bottom: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .api-box input { width: 70%; padding: 8px; border: 1px solid #ddd; border-radius: 5px; }
        .api-box button { padding: 8px 15px; background: #8e24aa; color: white; border: none; border-radius: 5px; cursor: pointer; }

        /* Sohbet Ekranı */
        .chat-container {
            flex: 1;
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
            overflow-hidden;
        }
        .chat-messages { flex: 1; overflow-y: auto; margin-bottom: 15px; padding-right: 10px; }
        .message { margin-bottom: 15px; padding: 10px 15px; border-radius: 10px; max-width: 80%; line-height: 1.5; }
        .bot { background: #f1f0f0; align-self: flex-start; color: #333; }
        .user { background: #e1bee7; align-self: flex-end; margin-left: auto; color: #4a148c; }
        
        /* Girdi Alanı */
        .input-area { display: flex; gap: 10px; }
        .input-area input { flex: 1; padding: 12px; border: 1px solid #ccc; border-radius: 8px; outline: none; }
        .input-area button { padding: 12px 25px; background: #4a148c; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .input-area button:hover { background: #7b1fa2; }
    </style>
</head>
<body>

    <!-- SOL TARAF: RESİMLER -->
    <div class="left-side">
        <!-- Buradaki URL'leri kendi istediğin resim linkleriyle değiştirebilirsin -->
        <img src="https://images.unsplash.com/photo-1596462502278-27bfdc403348?w=500" alt="Makyaj Malzemeleri">
        <img src="https://images.unsplash.com/photo-1522335789203-aabd1fc54bc9?w=500" alt="Renk Paleti">
    </div>

    <!-- SAĞ TARAF: YAPAY ZEKA ASİSTANI -->
    <div class="right-side">
        <div class="header">
            <h2>AI Makyaj ve Renk Tonu Danışmanı</h2>
            <p>Birkaç soruyla sana en uygun makyaj tonlarını bulalım!</p>
        </div>

        <!-- API Anahtarı Girişi (Güvenlik için kullanıcının girmesi ya da tarayıcıda saklanması en iyisidir) -->
        <div class="api-box" id="apiBox">
            <label for="apiKey">Google AI Studio API Anahtarınız: </label>
            <input type="password" id="apiKey" placeholder="AIzaSy...">
            <button onclick="saveKey()">Kaydet</button>
        </div>

        <div class="chat-container">
            <div class="chat-messages" id="chatMessages">
                <div class="message bot">
                    Merhaba! Ben senin kişisel makyaj danışmanım. Sana en uygun renk tonlarını belirleyebilmem için hazır mısın? <br><br>
                    Başlamak için lütfen bana **ten rengini (açık, buğday, esmer)** ve **göz rengini** söyler misin?
                </div>
            </div>
            <div class="input-area">
                <input type="text" id="userInput" placeholder="Mesajınızı yazın..." onkeypress="if(event.key === 'Enter') sendMessage()">
                <button onclick="sendMessage()">Gönder</button>
            </div>
        </div>
    </div>

    <script>
        let GEMINI_API_KEY = localStorage.getItem("gemini_key") || "";
        if(GEMINI_API_KEY) {
            document.getElementById("apiBox").style.display = "none";
        }

        function saveKey() {
            const key = document.getElementById("apiKey").value.trim();
            if(key) {
                localStorage.setItem("gemini_key", key);
                GEMINI_API_KEY = key;
                document.getElementById("apiBox").style.display = "none";
                alert("API Anahtarı başarıyla kaydedildi!");
            }
        }

        // Gemini'ye karakter kazandıran sistem talimatı (System Instruction)
        const systemInstruction = "Sen profesyonel bir makyaj ve renk analizi uzmanı yapay zekasın. Kullanıcıya ten rengi, alt tonu (sıcak/soğuk/nötr), göz rengi ve saç rengi hakkında sorular sorarak interaktif bir test yap. Testin sonunda ona en uygun ruj, far, allık ve fondöten renk tonlarını (kodları veya isimleriyle) listele. Nazik, enerjik ve estetik bir dil kullan.";

        let chatHistory = [
            { role: "user", parts: [{ text: systemInstruction }] },
            { role: "model", parts: [{ text: "Anlaşıldı. Kullanıcıya makyaj renk analizi testi uygulamak için hazırım." }] }
        ];

        async function sendMessage() {
            const inputField = document.getElementById("userInput");
            const userText = inputField.value.trim();
            if (!userText) return;

            if (!GEMINI_API_KEY) {
                alert("Lütfen önce Google AI Studio'dan aldığınız API anahtarını yukarıya girip kaydedin.");
                return;
            }

            // Kullanıcı mesajını ekrana ekle
            appendMessage(userText, "user");
            inputField.value = "";

            // Geçmişe ekle
            chatHistory.push({ role: "user", parts: [{ text: userText }] });

            // Yükleniyor mesajı
            const loadingDiv = appendMessage("Düşünüyor...", "bot");

            try {
                // Gemini 1.5 Flash API Çağrısı (2026 standartlarına uygun güncel ve hızlı model)
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ contents: chatHistory })
                });

                const data = await response.json();
                loadingDiv.remove(); // Yükleniyor yazısını kaldır

                if (data.candidates && data.candidates[0].content.parts[0].text) {
                    const botReply = data.candidates[0].content.parts[0].text;
                    
                    // Bot cevabını ekrana yaz ve geçmişe ekle
                    appendMessage(botReply, "bot");
                    chatHistory.push({ role: "model", parts: [{ text: botReply }] });
                } else {
                    appendMessage("Bir hata oluştu, lütfen API anahtarınızı kontrol edin.", "bot");
                }

            } catch (error) {
                console.error(error);
                loadingDiv.remove();
                appendMessage("Bağlantı hatası oluştu.", "bot");
            }
        }

        function appendMessage(text, sender) {
            const chatMessages = document.getElementById("chatMessages");
            const msgDiv = document.createElement("div");
            msgDiv.className = `message ${sender}`;
            
            // Satır satır boşlukları ve basit markdownları görünür kılmak için
            msgDiv.innerHTML = text.replace(/\n/g, "<br>").replace(/\*\*(.*?)\*\*/g, "<strong>$1</strong>");
            
            chatMessages.appendChild(msgDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
            return msgDiv;
        }
    </script>
</body>
</html>
